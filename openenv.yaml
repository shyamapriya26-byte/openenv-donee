name: support-env
description: >
  A reinforcement learning environment that simulates customer support workflows.
  Agents must diagnose and resolve issues through multi-step actions.

version: 0.1.0

entry_point: env:SupportEnv

observation_space:
  type: object
  properties:
    issue:
      type: string
    current_step:
      type: integer
    steps_taken:
      type: integer

action_space:
  type: string
  description: Action taken by the agent (e.g., ask_issue, suggest_restart)

reward_range: [0.0, 1.0]

tasks:
  - name: internet_not_working
    description: User reports the internet is not working
    grader: grader.grade_internet_not_working

  - name: slow_laptop
    description: User's laptop is running slowly
    grader: grader.grade_slow_laptop

  - name: wifi_disconnecting
    description: WiFi keeps disconnecting
    grader: grader.grade_wifi_disconnecting
